config_name = "FCC_idea_like"
# https://arxiv.org/html/2502.21223v4
[hadron_calorimeter]
# Based on IDEA concept where transition between barrel and endcap happens at 45 degrees
halflength = 4.6
inner_radius = 2.8
# If tower length defined, use towers a la IDEA
tower_length = 1.8
# Else, if outer radius defined, calorimeter will be a cylindrical barrel.
#outer_radius = 4.6
# Density of Cu in g/cm3
# Assume 50% copper by volume. Precise number depends on final design. Cu density: 8.96 g/cm3
density = 4.48
# But there is air and fibres in the calo. The effective interaction length is 25 cm. If we scale the density by the number of interaction lengths, the effective density becomes 9 g/cm3.
Z = 29
A = 63
# Pion interaction length in cm: 18.51
interaction_length = 9.255
#max_eta = 2.595
max_eta = 1000

[electromagnetic_calorimeter]

# BGO density 7 g / cm 3
# Cristal length 20 cm (including back and front).
# About 18% more interactions.

[FCC]
# Luminosity in fb and sqrts in GeV.
# From https://arxiv.org/pdf/2505.00274 Section 2.1.1
luminosity = 125000
sqrts = 91.2 
# luminosity = 40000
# sqrts = 87.9
# luminosity = 40000
# sqrts = 94.3

# Assume 2 interaction points
N_IP = 4

[Neutrino]
# For simple cross section model. In cm2/Gev/nucleon. From PDG review.
nu_CC_cross_section = 0.667e-38
nubar_CC_cross_section = 0.334e-38

[Constants]
# in Kg
proton_mass = 1.6726e-27
